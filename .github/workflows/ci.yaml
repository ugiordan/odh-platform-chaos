name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

env:
  GO_VERSION: "1.25.0"

jobs:
  go-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Create dashboard UI placeholder
        run: mkdir -p dashboard/ui-dist && echo '<!-- placeholder -->' > dashboard/ui-dist/index.html
      - name: go vet
        run: go vet ./...
      - name: Run tests
        run: go test -race ./... -count=1
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  validate-experiments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Create dashboard UI placeholder
        run: mkdir -p dashboard/ui-dist && echo '<!-- placeholder -->' > dashboard/ui-dist/index.html
      - name: Build CLI
        run: go build -o bin/operator-chaos ./cmd/operator-chaos
      - name: Validate experiment files
        shell: bash
        run: |
          count=0
          status=0
          for dir in experiments profiles/*/experiments; do
            [ -d "$dir" ] || continue
            while IFS= read -r -d '' file; do
              count=$((count + 1))
              if ! bin/operator-chaos validate "$file"; then
                status=1
              fi
            done < <(find "$dir" \( -name '*.yaml' -o -name '*.yml' \) -print0)
          done
          if [ "$count" -eq 0 ]; then
            echo "ERROR: no experiment YAML files found"
            exit 1
          fi
          echo "Validated $count experiment files"
          exit "$status"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build dashboard UI
        working-directory: dashboard/ui
        run: npm ci && npm run build
      - name: Build all binaries
        run: go build -o /dev/null ./...
