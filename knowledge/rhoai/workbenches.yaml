operator:
  name: workbenches
  namespace: redhat-ods-applications
  repository: https://github.com/opendatahub-io/kubeflow

components:
  - name: odh-notebook-controller
    controller: DataScienceCluster
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: odh-notebook-controller-manager
        namespace: redhat-ods-applications
        labels:
          app: odh-notebook-controller
          app.kubernetes.io/part-of: workbenches
      - apiVersion: v1
        kind: ServiceAccount
        name: odh-notebook-controller-manager
        namespace: redhat-ods-applications
      - apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        name: odh-notebook-controller-manager-rolebinding
      - apiVersion: v1
        kind: Service
        name: odh-notebook-controller-webhook-service
        namespace: redhat-ods-applications
      - apiVersion: v1
        kind: Secret
        name: odh-notebook-controller-webhook-cert
        namespace: redhat-ods-applications
    webhooks:
      - name: notebooks.opendatahub.io
        type: mutating
        path: /mutate-notebook-v1
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: odh-notebook-controller-manager
          namespace: redhat-ods-applications
          conditionType: Available
      timeout: "60s"

  - name: kf-notebook-controller
    controller: DataScienceCluster
    managedResources:
      - apiVersion: apps/v1
        kind: Deployment
        name: notebook-controller-deployment
        namespace: redhat-ods-applications
        labels:
          app: notebook-controller
          app.kubernetes.io/part-of: workbenches
      - apiVersion: v1
        kind: ServiceAccount
        name: notebook-controller-service-account
        namespace: redhat-ods-applications
      - apiVersion: v1
        kind: ConfigMap
        name: notebook-controller-config
        namespace: redhat-ods-applications
    steadyState:
      checks:
        - type: conditionTrue
          apiVersion: apps/v1
          kind: Deployment
          name: notebook-controller-deployment
          namespace: redhat-ods-applications
          conditionType: Available
      timeout: "60s"

recovery:
  reconcileTimeout: "300s"
  maxReconcileCycles: 10
